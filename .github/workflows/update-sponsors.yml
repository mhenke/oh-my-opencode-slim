name: Update Sponsors

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate sponsors
        run: bun run sponsors
        env:
          SPONSORKIT_GITHUB_TOKEN: ${{ secrets.SPONSORS_PAT }}
          SPONSORKIT_GITHUB_LOGIN: alvinunreal

      - name: Commit sponsors
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: update sponsors [skip ci]'
          file_pattern: sponsors.svg
