name: Sponsor Label

on:
  issues:
    types: [opened, reopened]
  pull_request_target:
    types: [opened, reopened, ready_for_review]

permissions:
  issues: write
  pull-requests: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Label sponsor authors
        uses: actions/github-script@v7
        env:
          SPONSORS_PAT: ${{ secrets.SPONSORS_PAT }}
        with:
          script: |
            const sponsorToken = process.env.SPONSORS_PAT

            if (!sponsorToken) {
              core.info('SPONSORS_PAT is not configured; skipping sponsor label.')
              return
            }

            const item = context.payload.issue || context.payload.pull_request
            const author = item?.user?.login

            if (!author) {
              core.info('No issue or pull request author found; skipping.')
              return
            }

            const sponsorClient = github.getOctokit(sponsorToken)
            const query = `
              query($login: String!) {
                user(login: $login) {
                  sponsorshipsAsMaintainer(first: 100, activeOnly: true) {
                    nodes {
                      sponsorEntity {
                        ... on User { login }
                        ... on Organization { login }
                      }
                      tier { monthlyPriceInDollars }
                    }
                  }
                }
              }
            `

            const result = await sponsorClient.graphql(query, {
              login: context.repo.owner,
            })

            const sponsorship = result.user.sponsorshipsAsMaintainer.nodes.find(
              (node) => node.sponsorEntity?.login?.toLowerCase() === author.toLowerCase(),
            )

            if (!sponsorship) {
              core.info(`@${author} is not an active sponsor; skipping.`)
              return
            }

            const labels = [
              {
                name: 'sponsor',
                color: 'EA4AAA',
                description: 'Opened by an active GitHub Sponsor',
              },
            ]

            if (sponsorship.tier?.monthlyPriceInDollars >= 250) {
              labels.push({
                name: 'pantheon sponsor',
                color: '8250DF',
                description: 'Opened by a high-tier GitHub Sponsor',
              })
            }

            for (const label of labels) {
              try {
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ...label,
                })
              } catch (error) {
                if (error.status !== 422) throw error
              }
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: item.number,
              labels: labels.map((label) => label.name),
            })
